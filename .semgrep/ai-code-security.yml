rules:
  # Hardcoded secrets
  - id: hardcoded-api-key
    patterns:
      - pattern: |
          const $VAR = "sk-..."
      - pattern: |
          const $VAR = "ghp_..."
      - pattern: |
          apiKey: "..."
    message: Hardcoded API key detected. Use environment variables instead.
    languages: [javascript, typescript]
    severity: ERROR

  - id: hardcoded-password
    pattern: |
      password: "$PASS"
    message: Hardcoded password in source code. Use environment variables or secrets manager.
    languages: [javascript, typescript]
    severity: ERROR

  # SQL injection
  - id: sql-string-concat
    patterns:
      - pattern: |
          $QUERY = "SELECT" + $INPUT
      - pattern: |
          $QUERY = `SELECT ... ${$INPUT} ...`
      - pattern: |
          db.query("..." + $VAR)
      - pattern: |
          db.query(`...${$VAR}...`)
    message: Potential SQL injection via string concatenation. Use parameterized queries.
    languages: [javascript, typescript]
    severity: ERROR

  # Command injection
  - id: exec-string-interpolation
    patterns:
      - pattern: exec(`...${ ... }...`)
      - pattern: exec("..." + $VAR)
      - pattern: execSync(`...${...}...`)
    message: Potential command injection via exec() with interpolated string. Use execFile() with argument array.
    languages: [javascript, typescript]
    severity: ERROR

  - id: prefer-execfile
    pattern: |
      import { exec } from "child_process"
    message: Prefer execFile() over exec() to avoid shell injection. Import execFile instead.
    languages: [javascript, typescript]
    severity: WARNING

  # Insecure randomness
  - id: math-random-security
    patterns:
      - pattern: |
          token = Math.random()
      - pattern: |
          secret = Math.random()
      - pattern: |
          id = Math.random().toString(...)
    message: Math.random() is not cryptographically secure. Use crypto.randomBytes().
    languages: [javascript, typescript]
    severity: ERROR

  # JWT without algorithm
  - id: jwt-no-algorithm
    pattern: |
      jwt.verify($TOKEN, $SECRET)
    message: "jwt.verify() called without explicit algorithms option. Add { algorithms: ['RS256'] } to prevent algorithm confusion attacks."
    languages: [javascript, typescript]
    severity: ERROR

  # XSS via innerHTML
  - id: innerhtml-assignment
    pattern: |
      $EL.innerHTML = $VAL
    message: Assignment to innerHTML can cause XSS. Use textContent or a sanitization library.
    languages: [javascript, typescript]
    severity: ERROR

  # Path traversal
  - id: path-traversal-join
    patterns:
      - pattern: |
          path.join($BASE, $REQ.params.$PARAM)
      - pattern: |
          path.join($BASE, $REQ.query.$PARAM)
      - pattern: |
          path.join($BASE, $REQ.body.$PARAM)
    message: Potential path traversal via user-supplied path parameter. Validate and resolve against a bounded root.
    languages: [javascript, typescript]
    severity: ERROR

  # Error detail leakage
  - id: stack-trace-in-response
    patterns:
      - pattern: |
          res.json({ error: $ERR.stack })
      - pattern: |
          res.send($ERR.stack)
      - pattern: |
          reply.send({ stack: $ERR.stack })
    message: Stack trace exposed in HTTP response. Return a generic error message to callers.
    languages: [javascript, typescript]
    severity: ERROR

  # Prompt injection defense
  - id: user-content-in-system-prompt
    patterns:
      - pattern: |
          { role: "system", content: `...${ $REQ.body.$X }...` }
      - pattern: |
          { role: "system", content: "..." + $USER_INPUT }
    message: User-controlled content interpolated into AI system prompt. This enables prompt injection. Keep system prompts static.
    languages: [javascript, typescript]
    severity: ERROR

  # Dangerous React patterns
  - id: dangerous-set-inner-html
    pattern: |
      dangerouslySetInnerHTML={{ __html: $VAL }}
    message: dangerouslySetInnerHTML used without explicit sanitization. Sanitize content with DOMPurify first.
    languages: [javascript, typescript]
    severity: WARNING

  # Wildcard CORS
  - id: wildcard-cors
    patterns:
      - pattern: |
          origin: "*"
      - pattern: |
          "Access-Control-Allow-Origin": "*"
    message: Wildcard CORS origin allows any site to make credentialed requests. Restrict to specific origins in production.
    languages: [javascript, typescript]
    severity: WARNING

  # Prototype pollution
  - id: prototype-pollution-assign
    patterns:
      - pattern: Object.assign($TARGET, $REQ.body)
      - pattern: Object.assign($TARGET, $REQ.query)
      - pattern: Object.assign($TARGET, $REQ.params)
    message: "Object.assign() with untrusted request data can cause prototype pollution. Validate and destructure only known keys first."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-1321"

  - id: prototype-pollution-dynamic-key
    pattern: |
      $OBJ[$REQ.body.$KEY] = $VAL
    message: "Dynamic property assignment from request data can cause prototype pollution (__proto__, constructor). Validate keys against an allowlist."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-1321"

  # TLS verification disabled
  - id: tls-reject-unauthorized-false
    patterns:
      - pattern: |
          rejectUnauthorized: false
      - pattern: |
          rejectUnauthorized: 0
      - pattern: |
          strictSSL: false
      - pattern: |
          verify: false
    message: "TLS certificate verification is disabled. This allows man-in-the-middle attacks. Never disable in production."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-295"

  - id: node-tls-env-disabled
    pattern: |
      process.env["NODE_TLS_REJECT_UNAUTHORIZED"] = "0"
    message: "NODE_TLS_REJECT_UNAUTHORIZED=0 disables TLS verification for all HTTPS in this process. Remove before deploying."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-295"

  # Weak cryptographic algorithms
  - id: weak-hash-algorithm
    patterns:
      - pattern: createHash("md5")
      - pattern: createHash("MD5")
      - pattern: createHash("sha1")
      - pattern: createHash("SHA1")
      - pattern: createHash("sha-1")
    message: "MD5 and SHA-1 are cryptographically broken. Use SHA-256 or SHA-384 for integrity, Argon2id for passwords."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-327"

  - id: weak-cipher-algorithm
    patterns:
      - pattern: createCipheriv("des", ...)
      - pattern: createCipheriv("des-ede", ...)
      - pattern: createCipheriv("des-ede3", ...)
      - pattern: createCipheriv("aes-128-ecb", ...)
      - pattern: createCipheriv("aes-256-ecb", ...)
      - pattern: createCipheriv("aes-192-ecb", ...)
    message: "Weak or broken cipher algorithm. Use AES-256-GCM for symmetric encryption."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-327"

  # S25 — RAG content in system role (retrieval document injection)
  - id: rag-content-in-system-role
    patterns:
      - pattern: |
          { role: "system", content: $PROMPT + $CHUNKS }
      - pattern: |
          { role: "system", content: `...${ $CHUNKS }...` }
    message: "Retrieved/external content concatenated into the system role message enables RAG injection. Place retrieved content in the user role with explicit untrusted framing."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-1427"

  # S26 — tool-call arguments used without schema validation
  - id: tool-call-args-no-validation
    patterns:
      - pattern: |
          JSON.parse($CALL.function.arguments)
      - pattern: |
          JSON.parse($CALL.arguments)
    message: "Tool-call arguments parsed without schema validation. An injected instruction could supply malicious arguments. Validate with Zod before use."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-1427"

  # S27 — unbounded file/fetch content fed to LLM without length cap
  - id: llm-context-no-length-cap
    patterns:
      - pattern: |
          { role: $ROLE, content: fs.readFileSync($PATH, ...) }
      - pattern: |
          { role: $ROLE, content: await $RES.text() }
    message: "Unbounded file or HTTP response content fed directly to LLM context. Apply a MAX_CONTENT_CHARS cap to prevent context window flooding."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-400"

  # S29 — raw LLM output fed as input to second LLM call
  - id: llm-output-to-llm-input
    patterns:
      - pattern: |
          { role: "user", content: $RESP.choices[0].message.content }
      - pattern: |
          { role: "user", content: $RESP.choices[0].message.content ?? $DEFAULT }
    message: "Raw LLM output passed as input to a second LLM call (second-order injection). Parse and validate the first model's output with a schema before using it as context."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-1426"

  # S30 — user-uploaded file passed directly to multimodal model without EXIF stripping
  - id: multimodal-upload-no-sanitize
    patterns:
      - pattern: |
          { type: "image_url", image_url: { url: `data:${ ... };base64,${ $BUFFER.toString("base64") }` } }
    message: "User-uploaded file passed directly to vision model. Strip EXIF metadata with sharp/exiftool and validate file type before passing to a multimodal model."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-1427"

  # S32 — Server-Side Request Forgery (SSRF)
  - id: ssrf-user-controlled-url
    patterns:
      - pattern: |
          fetch($REQ.body.$FIELD)
      - pattern: |
          fetch($REQ.query.$FIELD)
      - pattern: |
          fetch($REQ.params.$FIELD)
      - pattern: |
          axios.get($REQ.body.$FIELD)
      - pattern: |
          axios.get($REQ.query.$FIELD)
      - pattern: |
          axios.get($REQ.params.$FIELD)
      - pattern: |
          fetch(`${ $REQ.body.$FIELD }`)
      - pattern: |
          fetch(`${ $REQ.query.$FIELD }`)
    message: "Server-Side Request Forgery (SSRF) vulnerability: HTTP request to user-controlled URL. Validate against allowlist of permitted domains."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-918"

  - id: ssrf-dynamic-url-construction
    patterns:
      - pattern: |
          fetch(`https://${ $VAR }`)
      - pattern: |
          fetch("https://" + $VAR)
      - pattern: |
          axios.get(`https://${ $VAR }`)
      - pattern: |
          axios.get("https://" + $VAR)
    message: "Potential SSRF: Dynamic URL construction. Ensure the variable is validated against an allowlist of permitted domains."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-918"

  - id: ssrf-env-var-url
    patterns:
      - pattern: |
          fetch(process.env.$VAR)
      - pattern: |
          axios.get(process.env.$VAR)
      - pattern: |
          got(process.env.$VAR)
    message: "HTTP request to URL from environment variable. Validate the URL against an allowlist to prevent SSRF."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-918"

  # S33 — Server-Side Template Injection (SSTI)
  - id: ssti-user-controlled-template
    patterns:
      - pattern: |
          Handlebars.compile($REQ.body.$FIELD)
      - pattern: |
          ejs.render($REQ.body.$FIELD)
      - pattern: |
          nunjucks.render($REQ.body.$FIELD)
      - pattern: |
          $TEMPLATE.compile($REQ.params.$FIELD)
      - pattern: |
          $TEMPLATE.render($REQ.query.$FIELD)
    message: "Server-Side Template Injection (SSTI): User input directly compiled as template. Use predefined templates with validated data."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-1336"

  - id: ssti-dynamic-template-string
    patterns:
      - pattern: |
          Handlebars.compile(`${ ... }`)
      - pattern: |
          ejs.render(`${ ... }`)
      - pattern: |
          `{{ ${ $VAR } }}`
    message: "Potential SSTI: Dynamic template string construction. Ensure user data is sanitized and use predefined template patterns."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-1336"

  - id: ssti-unsafe-template-options
    patterns:
      - pattern: |
          allowProtoMethodsByDefault: true
      - pattern: |
          allowProtoPropertiesByDefault: true
    message: "Unsafe template engine configuration: Prototype access enabled. This can lead to prototype pollution attacks."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-1336"

  # S34 — Open Redirect (URL Redirection)
  - id: open-redirect-user-controlled
    patterns:
      - pattern: |
          res.redirect($REQ.query.$FIELD)
      - pattern: |
          res.redirect($REQ.body.$FIELD)
      - pattern: |
          res.redirect($REQ.params.$FIELD)
      - pattern: |
          response.redirect($REQ.query.$FIELD)
      - pattern: |
          $RES.setHeader("Location", $REQ.query.$FIELD)
    message: "Open Redirect vulnerability: User-controlled URL in redirect. Validate against an allowlist of permitted domains."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-601"

  - id: open-redirect-oauth-callback
    patterns:
      - pattern: |
          res.redirect($REQ.query.state)
      - pattern: |
          res.redirect($REQ.query.redirect_uri)
      - pattern: |
          res.redirect($REQ.query.return_url)
      - pattern: |
          res.redirect($REQ.query.next)
    message: "Potential Open Redirect in OAuth/auth flow: Callback URL not validated. Ensure redirect URLs are on allowlisted domains."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-601"

  - id: open-redirect-client-side
    patterns:
      - pattern: |
          window.location = $REQ.query.$FIELD
      - pattern: |
          location.href = $REQ.query.$FIELD
      - pattern: |
          document.location = $REQ.query.$FIELD
    message: "Client-side Open Redirect: User-controlled URL assigned to location. Validate the URL before redirecting."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-601"

  # S35 — XML External Entity (XXE) Injection
  - id: xxe-xml2js-unsafe
    patterns:
      - pattern: |
          xml2js.parseString($REQ.body.$FIELD, ...)
      - pattern: |
          xml2js.parseString($REQ.query.$FIELD, ...)
      - pattern: |
          $PARSER.parseString($REQ.body.xml, ...)
    message: "XML External Entity (XXE) vulnerability: User XML parsed without XXE protection. Disable external entities in xml2js parser options."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-611"

  - id: xxe-dom-parser-unsafe
    patterns:
      - pattern: |
          new DOMParser().parseFromString($REQ.body.$FIELD, "text/xml")
      - pattern: |
          parseFromString($REQ.body.xml, "text/xml")
      - pattern: |
          $PARSER.parseFromString($USER_XML, "text/xml")
    message: "XXE vulnerability: DOMParser processing user XML. DOMParser is vulnerable to XXE attacks. Use a safe XML parser with entities disabled."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-611"

  - id: xxe-unsafe-parser-config
    patterns:
      - pattern: |
          processEntities: true
      - pattern: |
          externalEntities: true
      - pattern: |
          allowXXE: true
      - pattern: |
          xmlEntities: true
    message: "Unsafe XML parser configuration: External entity processing enabled. This allows XXE attacks. Set to false."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-611"

  - id: xxe-libxml-unsafe
    patterns:
      - pattern: |
          libxml.loadXmlDoc($REQ.body.$FIELD)
      - pattern: |
          libxml.parseXml($USER_INPUT)
    message: "XXE vulnerability: libxml processing user input. Configure libxml to disable external entity resolution."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-611"

  # S36 — Deserialization of Untrusted Data
  - id: unsafe-deserialization-node-serialize
    patterns:
      - pattern: |
          serialize.unserialize($REQ.body.$FIELD)
      - pattern: |
          serialize.unserialize($REQ.query.$FIELD)
      - pattern: |
          $SERIALIZER.unserialize($USER_INPUT)
    message: "Unsafe deserialization: node-serialize can execute arbitrary code. Use JSON with schema validation instead."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-502"

  - id: unsafe-deserialization-v8
    patterns:
      - pattern: |
          v8.deserialize($REQ.body.$FIELD)
      - pattern: |
          v8.deserialize(Buffer.from($REQ.body.$FIELD, ...))
    message: "Unsafe deserialization: v8.deserialize can execute arbitrary code. Use JSON for data exchange."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-502"

  - id: eval-with-json
    patterns:
      - pattern: |
          eval("(" + $REQ.body.$FIELD + ")")
      - pattern: |
          eval($REQ.body.json)
      - pattern: |
          Function($REQ.body.$FIELD)()
    message: "Code injection via eval() with user JSON. Use JSON.parse() with validation instead."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-502"

  - id: unsafe-json-reviver
    patterns:
      - pattern: |
          JSON.parse($DATA, function($KEY, $VALUE) { if ($KEY === "__proto__") return $VALUE; })
      - pattern: |
          JSON.parse($DATA, ($KEY, $VALUE) => { if ($KEY === "__proto__") return $VALUE; })
    message: "Unsafe JSON reviver allows prototype pollution. Block __proto__, constructor, and prototype keys."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-502"

  # S37 — Unrestricted File Upload
  - id: unrestricted-file-upload
    patterns:
      - pattern: |
          multer({ dest: $DIR })
      - pattern: |
          multer()
      - pattern: |
          fs.writeFileSync($PATH, $REQ.body.$FIELD)
    message: "Unrestricted file upload: No file type or size validation. Add fileFilter and limits to multer configuration."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-434"

  # Additional rapid CWE implementations
  - id: dos-regex-pattern
    patterns:
      - pattern: |
          new RegExp($REQ.body.$FIELD)
      - pattern: |
          $STR.match($REQ.query.$FIELD)
    message: "Potential ReDoS: User-controlled regex pattern can cause denial of service."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-400"

  - id: cleartext-storage
    patterns:
      - pattern: |
          fs.writeFileSync($PATH, $PASSWORD)
      - pattern: |
          localStorage.setItem($KEY, $PASSWORD)
      - pattern: |
          sessionStorage.setItem($KEY, $TOKEN)
    message: "Cleartext storage of sensitive data. Encrypt before storing."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-312"

  - id: http-transmission
    patterns:
      - pattern: |
          "http://"
      - pattern: |
          protocol: "http"
    message: "HTTP transmission in production. Use HTTPS for sensitive data."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      cwe: "CWE-319"
