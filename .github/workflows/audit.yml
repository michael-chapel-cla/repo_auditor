name: Repository Audit (Copilot Agent)

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository to audit (owner/repo)"
        required: true
        type: string
      audit_categories:
        description: "Comma-separated categories to run (security,quality,api,db)"
        required: false
        default: "security,quality,api,db"
        type: string

jobs:
  audit:
    name: Audit ${{ inputs.target_repo || 'configured repos' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout auditor repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install audit tools
        run: |
          pip install semgrep 2>/dev/null || npm install -g semgrep
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin v8.18.0 || true
          npm install

      - name: Determine target repos
        id: repos
        run: |
          if [ -n "${{ inputs.target_repo }}" ]; then
            echo "repos=${{ inputs.target_repo }}" >> $GITHUB_OUTPUT
          else
            REPOS=$(grep "^GITHUB_REPOS" .env.example | cut -d= -f2 || echo "")
            echo "repos=$REPOS" >> $GITHUB_OUTPUT
          fi

      - name: Clone target repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.repos.outputs.repos }}
        run: |
          SLUG=$(echo "$TARGET_REPO" | tr '/' '_')
          mkdir -p "workspace/$SLUG"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/$TARGET_REPO.git" \
            "workspace/$SLUG" --depth=50

      - name: Run static checks
        id: static
        env:
          TARGET_REPO: ${{ steps.repos.outputs.repos }}
        run: |
          SLUG=$(echo "$TARGET_REPO" | tr '/' '_')
          WORKSPACE="workspace/$SLUG"
          AUDIT_ID=$(python3 -c "import uuid; print(uuid.uuid4())")
          AUDIT_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OUT_DIR="reports/$SLUG/$AUDIT_ID"
          mkdir -p "$OUT_DIR"

          echo "audit_id=$AUDIT_ID" >> $GITHUB_OUTPUT
          echo "out_dir=$OUT_DIR" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "audit_ts=$AUDIT_TS" >> $GITHUB_OUTPUT

          # npm audit
          if [ -f "$WORKSPACE/package.json" ]; then
            cd "$WORKSPACE" && npm audit --json 2>/dev/null > "$OLDPWD/$OUT_DIR/npm-audit.json" || true
            cd "$OLDPWD"
          fi

          # gitleaks
          if command -v gitleaks &>/dev/null; then
            gitleaks detect --source "$WORKSPACE" \
              --report-format json \
              --report-path "$OUT_DIR/gitleaks.json" \
              --no-git --exit-code 0 || true
          fi

          # semgrep
          if command -v semgrep &>/dev/null; then
            semgrep --config .semgrep/ai-code-security.yml \
              --json "$WORKSPACE" > "$OUT_DIR/semgrep.json" 2>/dev/null || true
          fi

          # ESLint (if configured in target repo)
          if [ -f "$WORKSPACE/package.json" ]; then
            cd "$WORKSPACE"
            if grep -q '"eslint"' package.json 2>/dev/null; then
              npx eslint --format json --ext .ts,.tsx,.js,.jsx . \
                2>/dev/null > "$OLDPWD/$OUT_DIR/eslint.json" || true
            fi
            cd "$OLDPWD"
          fi

          echo "Static checks complete. Results in $OUT_DIR"

      - name: Run Copilot AI analysis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ steps.repos.outputs.repos }}
          OUT_DIR: ${{ steps.static.outputs.out_dir }}
          WORKSPACE: ${{ steps.static.outputs.workspace }}
          AUDIT_ID: ${{ steps.static.outputs.audit_id }}
          AUDIT_TS: ${{ steps.static.outputs.audit_ts }}
        run: |
          # Build the audit prompt from agent instructions + static check results
          PROMPT="$(cat agents/copilot/audit-instructions.md)

          Repository: $TARGET_REPO
          Workspace path: $WORKSPACE
          Output directory: $OUT_DIR
          Audit ID: $AUDIT_ID
          Started at: $AUDIT_TS

          Static check results are already written to $OUT_DIR/:
            - npm-audit.json  (if package.json exists)
            - gitleaks.json   (secrets scan)
            - semgrep.json    (pattern scan)
            - eslint.json     (if ESLint configured)

          Read those files, analyze the source code in $WORKSPACE, then write
          $OUT_DIR/results.json conforming to scripts/report-schema.json,
          $OUT_DIR/report.md, and $OUT_DIR/report.html."

          gh copilot explain "$PROMPT" > "$OUT_DIR/copilot-analysis.txt" 2>&1 || {
            echo "gh copilot not available or not authenticated — writing placeholder"
            cat > "$OUT_DIR/results.json" <<EOF
          {
            "auditId": "$AUDIT_ID",
            "repoFullName": "$TARGET_REPO",
            "status": "error",
            "startedAt": "$AUDIT_TS",
            "agentTool": "copilot",
            "summary": {
              "overallScore": 0,
              "totalFindings": 0,
              "riskLevel": "unknown",
              "bySeverity": { "critical": 0, "high": 0, "medium": 0, "low": 0, "info": 0 },
              "byCategory": { "security": 0, "quality": 0, "api": 0, "db": 0 }
            },
            "results": [],
            "findings": []
          }
          EOF
          }

      - name: Apply Phase 1 Enhancements
        if: always() && steps.static.outputs.out_dir
        env:
          OUT_DIR: ${{ steps.static.outputs.out_dir }}
          WORKSPACE: ${{ steps.static.outputs.workspace }}
        run: |
          # Apply Phase 1 "Richer Findings" enhancements if results.json exists
          if [ -f "$OUT_DIR/results.json" ]; then
            echo "Applying Phase 1 enhancements to $OUT_DIR/results.json"
            node utils/apply-phase1-enhancements.js "$OUT_DIR/results.json" "reports/" "$WORKSPACE" || {
              echo "Phase 1 enhancements failed, continuing with basic results"
            }
          else
            echo "No results.json found, skipping Phase 1 enhancements"
          fi

      - name: Remove cloned repository
        if: always()
        env:
          TARGET_REPO: ${{ steps.repos.outputs.repos }}
        run: |
          SLUG=$(echo "$TARGET_REPO" | tr '/' '_')
          rm -rf "workspace/$SLUG"
          echo "Removed workspace/$SLUG"

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports-${{ github.run_id }}
          path: reports/
          retention-days: 30
